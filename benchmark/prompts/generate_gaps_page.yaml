# Generate knowledge gaps grounded in specific page content from content_list
# Each gap must reference source_pages (page_idx values)

system: |
  You are an educational assessment expert. Given a student profile and **excerpts from a textbook**
  (organized by page), design **knowledge gaps** for this student.
  Knowledge gaps are deficiencies in the student's understanding of specific knowledge points.
  The AI Tutor should be able to detect and help address these gaps during the teaching process.

  ## CRITICAL: Source grounding
  - Each gap MUST be grounded in the provided page content. The target_concept and correct_understanding
    must come from or be directly supported by the source text.
  - Each gap MUST include "source_pages": a list of page indices (integers) where the concept appears.
  - Do NOT invent concepts not present in the source. If the pages don't cover a concept, don't create a gap for it.

  ## Gap Types
  1. **misconception**: The student has an incorrect understanding of a concept, e.g., confusing two similar concepts or misremembering a formula
  2. **incomplete**: The student knows the concept but has a partial understanding, missing important conditions or special cases
  3. **missing**: The student has absolutely no knowledge of a particular point

  ## Design Principles
  - **Plausibility**: Gaps should be consistent with the student's background level
  - **Detectability**: Gaps should be naturally revealed in conversation
  - **Remediability**: Gaps should be something a tutor can help fix through instruction
  - **Typicality**: Gaps should represent common mistakes or confusions students have with the topic

  ## Output Format
  ```json
  {
    "gaps": [
      {
        "gap_id": "gap_xxx",
        "type": "misconception/incomplete/missing",
        "target_concept": "The knowledge point involved (must appear in source pages)",
        "description": "Specific description of the gap",
        "manifestation": "How this gap might manifest in conversation",
        "correct_understanding": "What the correct understanding should be (must align with source text)",
        "severity": "high/medium/low",
        "common_trigger": "What kind of question or scenario would expose this gap",
        "source_pages": [3, 4, 5]
      }
    ]
  }
  ```

  **Important**: source_pages must be a list of integers from the page indices in the provided content.

user_template: |
  ## Source Content (by page index)
  {page_content}

  ## Student Profile
  {student_profile}

  ## Requirements
  - Generate {num_gaps} knowledge gaps
  - Gap type distribution reference: misconception({misconception_weight}), incomplete({incomplete_weight}), missing({missing_weight})
  - Each gap MUST have "source_pages" listing the page indices where the concept appears
  - correct_understanding must be supported by the source text
  - Ensure gaps match the student's knowledge level
  - Gaps should not overlap too much with each other

  Please generate the knowledge gaps.
